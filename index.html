<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Normal ENS"/>
<meta name="theme-color" content="#7b1c2e"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icons/icon-180.png"/>
<title>Escuela Normal Superior de Villavicencio</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --vino:#7b1c2e; --vino-dark:#5a1320; --vino-light:#9e2a3f;
  --gris:#4a4f5a; --gris-light:#6b7280; --gris-pale:#f0f1f3;
  --dorado:#c8a000; --dorado-light:#f0c030;
  --verde:#2e7d32; --naranja:#c45000; --morado:#6a1b9a;
  --rojo:#c62828;
  --bg:#f5f4f6; --card:#ffffff; --border:#ddd8e0; --border2:#f0eef3;
  --txt:#1c1a22; --txt2:#5a5466; --txt3:#9a8fa8;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:-apple-system,'Helvetica Neue',sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
#app{display:flex;flex-direction:column;min-height:100dvh;padding-top:var(--safe-top)}

/* ── Header ── */
header{
  position:sticky;top:var(--safe-top);z-index:100;
  background:rgba(91,19,32,0.97);
  backdrop-filter:saturate(180%) blur(16px);
  -webkit-backdrop-filter:saturate(180%) blur(16px);
  border-bottom:1px solid rgba(255,255,255,0.08);
  padding:10px 16px;
}
.h-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.h-logo-wrap{display:flex;align-items:center;gap:10px}
.h-escudo{width:42px;height:42px;border-radius:50%;object-fit:cover;border:2px solid rgba(200,160,0,0.6);flex-shrink:0}
.h-titles .h-name{font-size:15px;font-weight:700;color:#fff;line-height:1.2}
.h-titles .h-sub{font-size:10px;color:rgba(255,255,255,.6);margin-top:1px;letter-spacing:.03em}
.avatar-btn{background:none;border:none;cursor:pointer;padding:2px;-webkit-tap-highlight-color:transparent}
.avatar-circle{width:32px;height:32px;border-radius:50%;background:var(--dorado);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff}
.search-box{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.13);border-radius:10px;padding:8px 12px}
.search-box input{flex:1;background:none;border:none;outline:none;font-size:14px;color:#fff}
.search-box input::placeholder{color:rgba(255,255,255,.45)}

/* ── Filtros ── */
.filtros{display:flex;gap:8px;padding:10px 16px;background:var(--card);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.filtros::-webkit-scrollbar{display:none}
.filtro-btn{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:20px;border:1.5px solid var(--vino);background:transparent;font-size:12px;font-weight:600;color:var(--vino);cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent;transition:background .15s,color .15s}
.filtro-btn.active{background:var(--vino);color:#fff}

/* ── Nav ── */
nav{
  position:fixed;bottom:0;left:0;right:0;
  padding-bottom:var(--safe-bot);
  background:rgba(255,255,255,.95);
  backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-top:1px solid var(--border);
  display:flex;z-index:100;
}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0 8px;background:none;border:none;cursor:pointer;color:var(--txt3);font-size:10px;font-weight:600;-webkit-tap-highlight-color:transparent;transition:color .2s}
.nav-item.active{color:var(--vino)}

/* ── Main ── */
main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px calc(82px + var(--safe-bot))}

/* ── Cards ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:11px;cursor:pointer;transition:transform .12s;-webkit-tap-highlight-color:transparent;box-shadow:0 2px 8px rgba(123,28,46,.06)}
.card:active{transform:scale(0.98)}
.card-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.tipo-badge{display:flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
.card-fecha{font-size:11px;color:var(--txt3)}
.card-titulo{font-size:15px;font-weight:700;color:var(--txt);margin-bottom:5px;line-height:1.35}
.card-resumen{font-size:13px;color:var(--txt2);line-height:1.5;margin-bottom:8px}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:4px}
.card-autor{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--txt3)}
.dest-badge{display:flex;align-items:center;gap:3px;background:#fef3c7;border-radius:20px;padding:2px 7px;font-size:10px;font-weight:700;color:#92400e}
.evento-info{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--txt2);margin-bottom:5px;flex-wrap:wrap}
.admin-del{background:none;border:none;padding:4px;cursor:pointer;color:var(--rojo)}

/* ── Detalle ── */
#vista-detalle{display:none;position:fixed;inset:0;background:var(--bg);z-index:200;overflow-y:auto;padding-top:var(--safe-top)}
#vista-detalle.open{display:block}
.det-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;position:sticky;top:0;z-index:10}
.det-back,.det-share{background:rgba(255,255,255,.2);border:none;border-radius:10px;padding:8px;cursor:pointer;color:#fff;display:flex;align-items:center}
.det-body{padding:18px 18px 48px}
.det-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.det-fecha{font-size:12px;color:var(--txt2)}
.det-autor{display:flex;align-items:center;gap:4px;font-size:12px;font-weight:600}
.det-titulo{font-size:20px;font-weight:800;color:var(--txt);line-height:1.3;margin-bottom:14px}
.det-evento-box{border-radius:10px;padding:12px 14px;margin-bottom:14px;border-left:4px solid}
.det-evento-row{display:flex;align-items:center;gap:7px;font-size:13px;margin-bottom:4px}
.det-divider{height:1px;background:var(--border);margin-bottom:16px}
.det-cuerpo{font-size:15px;color:var(--txt);line-height:1.75;white-space:pre-line}
.det-sello{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-top:24px}
.det-sello img{width:38px;height:38px;border-radius:50%;object-fit:cover}
.det-sello-txt .s1{font-size:13px;font-weight:700;color:var(--vino)}
.det-sello-txt .s2{font-size:11px;color:var(--txt2)}

/* ── Calendario ── */
.cal-evento{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:13px;margin-bottom:10px;cursor:pointer;box-shadow:0 2px 8px rgba(123,28,46,.05)}
.cal-fecha-box{width:50px;height:54px;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;background:var(--vino)}
.cal-dia{font-size:22px;font-weight:800;color:#fff;line-height:1}
.cal-mes{font-size:9px;font-weight:700;color:rgba(255,255,255,.85);text-transform:uppercase}
.cal-info{flex:1}
.cal-titulo{font-size:14px;font-weight:700;color:var(--txt);margin-bottom:3px}
.cal-meta{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--txt2);flex-wrap:wrap}

/* ── Galería ── */
.album-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:14px;box-shadow:0 2px 8px rgba(123,28,46,.05)}
.album-header{display:flex;align-items:center;justify-content:space-between;padding:13px 14px}
.album-titulo{font-size:14px;font-weight:700;color:var(--txt)}
.album-fecha{font-size:11px;color:var(--txt2);margin-top:2px}
.album-count{background:#f3e8ed;border-radius:20px;padding:3px 9px;font-size:11px;font-weight:600;color:var(--vino)}
.fotos-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;padding:0 2px 2px}
.foto-thumb{width:100%;aspect-ratio:1;object-fit:cover;background:var(--border2);cursor:pointer;display:block}
.foto-more{position:relative;cursor:pointer}
.foto-more-overlay{position:absolute;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff}

/* ── Visor ── */
#visor{display:none;position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:300;align-items:center;justify-content:center;flex-direction:column}
#visor.open{display:flex}
#visor img{max-width:100%;max-height:72vh;object-fit:contain}
.visor-close{position:absolute;top:calc(var(--safe-top) + 16px);right:16px;background:rgba(255,255,255,.15);border:none;border-radius:10px;padding:8px 12px;cursor:pointer;color:#fff;font-size:18px}
.visor-nav{display:flex;gap:32px;margin-top:18px}
.visor-btn{background:rgba(255,255,255,.15);border:none;border-radius:10px;padding:10px 18px;cursor:pointer;color:#fff;font-size:22px}
.visor-btn:disabled{opacity:.25}
.visor-caption{color:rgba(255,255,255,.55);font-size:13px;margin-top:10px}

/* ── FAB ── */
#fab{display:none;position:fixed;bottom:calc(80px + var(--safe-bot) + 12px);right:20px;width:56px;height:56px;border-radius:28px;background:var(--dorado);border:none;cursor:pointer;font-size:28px;color:#fff;z-index:99;box-shadow:0 4px 14px rgba(0,0,0,.2);-webkit-tap-highlight-color:transparent;align-items:center;justify-content:center}
#fab.show{display:flex}

/* ── Modal publicar ── */
#modal-pub{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:400;align-items:flex-end;justify-content:center}
#modal-pub.open{display:flex}
.modal-sheet{background:var(--card);border-radius:20px 20px 0 0;padding:20px 20px calc(24px + var(--safe-bot));width:100%;max-height:90vh;overflow-y:auto}
.modal-title{font-size:18px;font-weight:700;color:var(--txt);margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--txt2)}
.tipo-row{display:flex;gap:8px;margin-bottom:14px}
.tipo-opt{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 6px;border-radius:12px;border:1.5px solid var(--border);background:none;cursor:pointer;font-size:11px;font-weight:600;color:var(--txt2);-webkit-tap-highlight-color:transparent;transition:all .15s}
.tipo-opt.active{border-color:var(--vino);background:#f8edf0;color:var(--vino)}
.tipo-opt .tipo-icon{font-size:20px}
.field-label{font-size:13px;font-weight:600;color:var(--txt);margin-bottom:5px;margin-top:12px;display:block}
.field-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 13px;font-size:14px;color:var(--txt);outline:none;font-family:inherit}
.field-input:focus{border-color:var(--vino)}
textarea.field-input{min-height:110px;resize:vertical}
.toggle-row{display:flex;align-items:center;justify-content:space-between;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-top:12px}
.toggle-info .tl{font-size:13px;font-weight:600;color:var(--txt)}
.toggle-info .ts{font-size:11px;color:var(--txt2);margin-top:1px}
.toggle-switch{position:relative;width:44px;height:26px}
.toggle-switch input{opacity:0;width:0;height:0;position:absolute}
.toggle-track{position:absolute;inset:0;background:var(--border);border-radius:13px;transition:background .2s;cursor:pointer}
.toggle-thumb{position:absolute;top:3px;left:3px;width:20px;height:20px;background:#fff;border-radius:50%;transition:transform .2s;pointer-events:none;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.toggle-switch input:checked + .toggle-track{background:var(--vino)}
.toggle-switch input:checked ~ .toggle-thumb{transform:translateX(18px)}
.btn-pub{width:100%;background:var(--vino);color:#fff;border:none;border-radius:12px;padding:15px;font-size:16px;font-weight:700;cursor:pointer;margin-top:16px;-webkit-tap-highlight-color:transparent}

/* ── Login ── */
#modal-login{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:400;align-items:flex-end;justify-content:center}
#modal-login.open{display:flex}
.login-sheet{background:var(--card);border-radius:20px 20px 0 0;padding:24px 20px calc(28px + var(--safe-bot));width:100%}
.login-title{font-size:18px;font-weight:700;color:var(--txt);margin-bottom:4px}
.login-sub{font-size:13px;color:var(--txt2);margin-bottom:18px}
.login-hint{background:#fdf2f5;border-radius:10px;padding:10px 13px;font-size:12px;color:var(--vino);margin-top:12px;line-height:1.5;border:1px solid #f0d0d8}
.btn-login{width:100%;background:var(--vino);color:#fff;border:none;border-radius:12px;padding:15px;font-size:16px;font-weight:700;cursor:pointer;margin-top:14px}
.profile-box{text-align:center;padding:8px 0}
.profile-av{width:64px;height:64px;border-radius:32px;background:var(--vino);margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;color:#fff}
.profile-name{font-size:17px;font-weight:700;color:var(--txt)}
.profile-email{font-size:13px;color:var(--txt2);margin-top:2px}
.profile-rol{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;margin-top:8px}
.btn-logout{width:100%;background:none;border:1.5px solid #fca5a5;border-radius:12px;padding:13px;font-size:15px;font-weight:600;color:var(--rojo);cursor:pointer;margin-top:14px}

/* ── iOS banner ── */
.ios-banner{background:#fff;border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px;display:flex;align-items:flex-start;gap:10px;box-shadow:0 2px 10px rgba(123,28,46,.09)}
.ios-step{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--txt2);padding:5px 0;border-bottom:1px solid var(--border2)}
.ios-step:last-child{border-bottom:none}
.ios-num{width:22px;height:22px;border-radius:50%;background:#fdf2f5;border:1px solid #f0c0cc;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--vino);flex-shrink:0}
.seccion{font-size:12px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.empty{display:flex;flex-direction:column;align-items:center;padding:48px 20px;gap:10px}
.empty-icon{font-size:48px;opacity:.3}
.empty-txt{font-size:15px;color:var(--txt2)}

/* ── Hero banner ── */
.hero-banner{background:linear-gradient(135deg,var(--vino-dark) 0%,var(--vino) 60%,var(--vino-light) 100%);border-radius:16px;padding:18px 16px;margin-bottom:14px;display:flex;align-items:center;gap:14px;overflow:hidden;position:relative}
.hero-escudo{width:64px;height:64px;border-radius:50%;object-fit:cover;border:3px solid rgba(200,160,0,0.7);flex-shrink:0;box-shadow:0 2px 12px rgba(0,0,0,.25)}
.hero-txt .ht1{font-size:14px;font-weight:800;color:#fff;line-height:1.3}
.hero-txt .ht2{font-size:11px;color:rgba(255,255,255,.75);margin-top:3px}
.hero-txt .ht3{font-size:11px;color:var(--dorado-light);margin-top:4px;font-weight:600}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.card,.cal-evento,.album-card{animation:fadeUp .3s ease both}
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="h-top">
      <div class="h-logo-wrap">
        <img class="h-escudo" id="escudo-header" src="" alt="Escudo ENS"/>
        <div class="h-titles">
          <div class="h-name">Escuela Normal Superior</div>
          <div class="h-sub">de Villavicencio · Oficial</div>
        </div>
      </div>
      <button class="avatar-btn" onclick="abrirLogin()">
        <div id="avatar-disp">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
          </svg>
        </div>
      </button>
    </div>
    <div class="search-box">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="search" id="busqueda" placeholder="Buscar circulares, noticias…" oninput="renderFeed()"/>
    </div>
  </header>

  <div class="filtros" id="filtros-bar">
    <button class="filtro-btn active" onclick="setFiltro('todos',this)">📋 Todo</button>
    <button class="filtro-btn" onclick="setFiltro('circular',this)">📄 Circulares</button>
    <button class="filtro-btn" onclick="setFiltro('noticia',this)">📰 Noticias</button>
    <button class="filtro-btn" onclick="setFiltro('evento',this)">📅 Eventos</button>
  </div>

  <main>
    <div id="view-inicio"></div>
    <div id="view-calendario" style="display:none"></div>
    <div id="view-galeria" style="display:none"></div>
  </main>

  <nav>
    <button class="nav-item active" onclick="switchView('inicio',this)">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
      Inicio
    </button>
    <button class="nav-item" onclick="switchView('calendario',this)">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Calendario
    </button>
    <button class="nav-item" onclick="switchView('galeria',this)">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      Galería
    </button>
  </nav>

  <button id="fab" onclick="abrirPublicar()">＋</button>
</div>

<!-- Detalle -->
<div id="vista-detalle">
  <div id="det-header-bar" class="det-header">
    <button class="det-back" onclick="cerrarDetalle()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    </button>
    <button class="det-share" onclick="compartirItem()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="m8.59 13.51 6.83 3.98M15.41 6.51l-6.82 3.98"/></svg>
    </button>
  </div>
  <div class="det-body" id="det-body"></div>
</div>

<!-- Visor fotos -->
<div id="visor">
  <button class="visor-close" onclick="cerrarVisor()">✕</button>
  <img id="visor-img" src="" alt=""/>
  <div class="visor-nav">
    <button class="visor-btn" id="visor-prev" onclick="navVisor(-1)">‹</button>
    <button class="visor-btn" id="visor-next" onclick="navVisor(1)">›</button>
  </div>
  <div class="visor-caption" id="visor-cap"></div>
</div>

<!-- Modal publicar -->
<div id="modal-pub" onclick="if(event.target===this)cerrarPublicar()">
<div class="modal-sheet">
  <div class="modal-title">Nueva publicación <button class="modal-close" onclick="cerrarPublicar()">✕</button></div>
  <div class="tipo-row">
    <button class="tipo-opt active" onclick="selTipo('circular',this)"><span class="tipo-icon">📄</span>Circular</button>
    <button class="tipo-opt" onclick="selTipo('noticia',this)"><span class="tipo-icon">📰</span>Noticia</button>
    <button class="tipo-opt" onclick="selTipo('evento',this)"><span class="tipo-icon">📅</span>Evento</button>
  </div>
  <label class="field-label">Título *</label>
  <input id="pub-titulo" class="field-input" placeholder="Ej: Circular N° 13 — Actividades culturales" maxlength="120"/>
  <label class="field-label">Resumen</label>
  <input id="pub-resumen" class="field-input" placeholder="Breve descripción para la lista"/>

function renderFeed(){
  const q=(document.getElementById('busqueda').value||'').toLowerCase();
  let items=DATOS.filter(i=>{
    return (filtroActual==='todos'||i.tipo===filtroActual)&&
           (!q||i.titulo.toLowerCase().includes(q)||(i.resumen||'').toLowerCase().includes(q));
  }).sort((a,b)=>new Date(b.fecha)-new Date(a.fecha));
  const cont=document.getElementById('view-inicio');
  let html='';
  if(!document.getElementById('ios-banner-shown')&&isIOS&&!isStandalone){
    html+=`<div class="ios-banner">
      <div style="flex:1">
        <div style="font-size:13px;font-weight:700;color:var(--vino);margin-bottom:8px">📲 Instalar en tu iPhone</div>
        <div class="ios-step"><div class="ios-num">1</div><span>Toca <strong>Compartir</strong> (□↑) en Safari</span></div>
        <div class="ios-step"><div class="ios-num">2</div><span>Selecciona <strong>"Agregar a pantalla de inicio"</strong></span></div>
        <div class="ios-step"><div class="ios-num">3</div><span>Toca <strong>Agregar</strong> ✓</span></div>
      </div>
      <button onclick="this.closest('.ios-banner').remove();localStorage.setItem('ios-b','1')" style="background:none;border:none;font-size:18px;color:var(--txt2);cursor:pointer;align-self:flex-start;padding:2px">✕</button>
    </div>`;
  }
  if(!items.length){
    html+=`<div class="empty"><div class="empty-icon">🔍</div><div class="empty-txt">No se encontraron resultados</div></div>`;
  } else {
    html+=items.map(item=>{
      const cfg=TIPO_CFG[item.tipo];
      const admin=usuarioActual?.rol==='admin';
      return `<div class="card" onclick="abrirDetalle('${item.id}')">
        <div class="card-meta">
          <div class="tipo-badge" style="background:${cfg.bg};color:${cfg.color}">${cfg.icon} ${cfg.label}</div>
          <span class="card-fecha">${fmtFecha(item.fecha)}</span>
        </div>
        <div class="card-titulo">${item.titulo}</div>
        ${item.resumen?`<div class="card-resumen">${item.resumen}</div>`:''}
        ${item.tipo==='evento'&&item.horaEvento?`<div class="evento-info">🕐 ${item.horaEvento}&nbsp;&nbsp;📍 ${item.lugar}</div>`:''}
        <div class="card-footer">
          <div class="card-autor">👤 ${item.autor}</div>
          <div style="display:flex;align-items:center;gap:8px">
            ${item.destacado?'<div class="dest-badge">⭐ Destacado</div>':''}
            ${admin?`<button class="admin-del" onclick="event.stopPropagation();eliminar('${item.id}')">🗑️</button>`:''}
          </div>
        </div>
      </div>`;
    }).join('');
  }
  cont.innerHTML=html;
}

function renderCalendario(){
  const eventos=DATOS.filter(i=>i.tipo==='evento').sort((a,b)=>new Date(a.fechaEvento)-new Date(b.fechaEvento));
  const cont=document.getElementById('view-calendario');
  if(!eventos.length){cont.innerHTML=`<div class="empty"><div class="empty-icon">📅</div><div class="empty-txt">No hay eventos programados</div></div>`;return}
  cont.innerHTML=`<div class="seccion">Próximos eventos</div>`+eventos.map(e=>{
    const d=new Date(e.fechaEvento+'T12:00:00');
    return `<div class="cal-evento" onclick="abrirDetalle('${e.id}')">
      <div class="cal-fecha-box"><div class="cal-dia">${d.getDate()}</div><div class="cal-mes">${MESES[d.getMonth()]}</div></div>
      <div class="cal-info">
        <div class="cal-titulo">${e.titulo}</div>
        <div class="cal-meta">${e.horaEvento?`<span>🕐 ${e.horaEvento}</span>`:''}${e.lugar?`<span>📍 ${e.lugar}</span>`:''}</div>
      </div>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9a8fa8" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
    </div>`;
  }).join('');
}

function renderGaleria(){
  const cont=document.getElementById('view-galeria');
  cont.innerHTML=GALERIA.map(album=>{
    const f3=album.fotos.slice(0,3), extra=album.fotos.length-3;
    return `<div class="album-card">
      <div class="album-header">
        <div><div class="album-titulo">${album.titulo}</div><div class="album-fecha">${fmtFecha(album.fecha)}</div></div>
        <div class="album-count">${album.fotos.length} fotos</div>
      </div>
      <div class="fotos-grid">${f3.map((f,i)=>`
        <div class="${i===2&&extra>0?'foto-more':''}" onclick="abrirVisor('${album.id}',${i})">
          <img class="foto-thumb" src="${f}" loading="lazy"/>
          ${i===2&&extra>0?`<div class="foto-more-overlay">+${extra}</div>`:''}
        </div>`).join('')}
      </div>
    </div>`;
  }).join('');
}

function abrirDetalle(id){
  itemDetalle=DATOS.find(i=>i.id===id); if(!itemDetalle)return;
  const cfg=TIPO_CFG[itemDetalle.tipo];
  document.getElementById('det-header-bar').style.background=cfg.color;
  document.getElementById('det-body').innerHTML=`
    <div class="det-meta">
      <span class="det-fecha">${fmtFecha(itemDetalle.fecha)}</span>
      <span class="det-autor" style="color:${cfg.color}">${cfg.icon} ${itemDetalle.autor}</span>
    </div>
    <div class="det-titulo">${itemDetalle.titulo}</div>
    ${itemDetalle.tipo==='evento'?`<div class="det-evento-box" style="background:${cfg.bg};border-left-color:${cfg.color}">
      ${itemDetalle.fechaEvento?`<div class="det-evento-row">📅 <span>${fmtFecha(itemDetalle.fechaEvento)}</span></div>`:''}
      ${itemDetalle.horaEvento?`<div class="det-evento-row">🕐 <span>${itemDetalle.horaEvento}</span></div>`:''}
      ${itemDetalle.lugar?`<div class="det-evento-row">📍 <span>${itemDetalle.lugar}</span></div>`:''}
    </div>`:''}
    <div class="det-divider"></div>
    <div class="det-cuerpo">${itemDetalle.cuerpo}</div>
    <div class="det-sello">
      <img src="${ESCUDO_SRC}" style="width:38px;height:38px;border-radius:50%;object-fit:cover;border:2px solid #e8d0d6"/>
      <div class="det-sello-txt"><div class="s1">Escuela Normal Superior</div><div class="s2">de Villavicencio · Comunicación oficial</div></div>
    </div>`;
  document.getElementById('vista-detalle').classList.add('open');
}
function cerrarDetalle(){document.getElementById('vista-detalle').classList.remove('open')}
function compartirItem(){if(!itemDetalle)return;if(navigator.share)navigator.share({title:itemDetalle.titulo,text:itemDetalle.cuerpo});else alert('Comparte esta comunicación con los padres de familia.')}

function abrirVisor(albumId,idx){visorAlbum=GALERIA.find(a=>a.id===albumId);visorIdx=idx;actualizarVisor();document.getElementById('visor').classList.add('open')}
function actualizarVisor(){document.getElementById('visor-img').src=visorAlbum.fotos[visorIdx];document.getElementById('visor-cap').textContent=`${visorIdx+1} / ${visorAlbum.fotos.length}`;document.getElementById('visor-prev').disabled=visorIdx===0;document.getElementById('visor-next').disabled=visorIdx===visorAlbum.fotos.length-1}
function navVisor(d){visorIdx+=d;actualizarVisor()}
function cerrarVisor(){document.getElementById('visor').classList.remove('open')}

function switchView(v,btn){
  vistaActual=v;
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  ['inicio','calendario','galeria'].forEach(id=>document.getElementById('view-'+id).style.display=id===v?'block':'none');
  document.getElementById('filtros-bar').style.display=v==='inicio'?'flex':'none';
  if(v==='calendario')renderCalendario();if(v==='galeria')renderGaleria();
  window.scrollTo({top:0,behavior:'smooth'});
}
function setFiltro(f,btn){filtroActual=f;document.querySelectorAll('.filtro-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderFeed()}

function abrirPublicar(){document.getElementById('modal-pub').classList.add('open')}
function cerrarPublicar(){document.getElementById('modal-pub').classList.remove('open')}
function selTipo(t,btn){tipoPublicar=t;document.querySelectorAll('.tipo-opt').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.getElementById('evento-extras').style.display=t==='evento'?'block':'none'}
function publicar(){
  const titulo=document.getElementById('pub-titulo').value.trim();
  const cuerpo=document.getElementById('pub-cuerpo').value.trim();
  if(!titulo){alert('El título es obligatorio');return}if(!cuerpo){alert('El contenido es obligatorio');return}
  DATOS.unshift({id:tipoPublicar[0]+Date.now(),tipo:tipoPublicar,titulo,resumen:document.getElementById('pub-resumen').value.trim(),cuerpo,autor:document.getElementById('pub-autor').value.trim()||'Rectoría',fecha:new Date().toISOString().split('T')[0],destacado:document.getElementById('pub-dest').checked,...(tipoPublicar==='evento'&&{fechaEvento:document.getElementById('pub-fecha-ev').value,horaEvento:document.getElementById('pub-hora').value,lugar:document.getElementById('pub-lugar').value})});
  cerrarPublicar();['pub-titulo','pub-resumen','pub-cuerpo','pub-hora','pub-lugar'].forEach(id=>document.getElementById(id).value='');document.getElementById('pub-dest').checked=false;
  renderFeed();alert('✓ Publicado exitosamente');
}
function eliminar(id){if(!confirm('¿Eliminar esta publicación?'))return;DATOS=DATOS.filter(i=>i.id!==id);renderFeed();if(vistaActual==='calendario')renderCalendario()}

function abrirLogin(){renderLogin();document.getElementById('modal-login').classList.add('open')}
function cerrarLogin(){document.getElementById('modal-login').classList.remove('open')}
function renderLogin(){
  const s=document.getElementById('login-sheet-inner');
  if(usuarioActual){s.innerHTML=`<div class="profile-box"><div class="profile-av">${usuarioActual.nombre[0]}</div><div class="profile-name">${usuarioActual.nombre}</div><div class="profile-email">${usuarioActual.email}</div><div class="profile-rol" style="background:${usuarioActual.rol==='admin'?'#f8edf0':'#edf5ee'};color:${usuarioActual.rol==='admin'?'var(--vino)':'#2e5e32'}">${usuarioActual.rol==='admin'?'🛡️ Administrador':'👤 Padre de familia'}</div><button class="btn-logout" onclick="logout()">Cerrar sesión</button></div>`}
  else{s.innerHTML=`<div class="login-title">Iniciar sesión</div><div class="login-sub">Acceso para administradores y docentes</div><label class="field-label">Correo</label><input id="l-email" class="field-input" type="email" placeholder="correo@normal.edu.co" autocapitalize="none"/><label class="field-label">Contraseña</label><input id="l-pass" class="field-input" type="password" placeholder="••••••••"/><button class="btn-login" onclick="hacerLogin()">Ingresar</button><div class="login-hint">Demo: <strong>rector@normal.edu.co</strong> / <strong>normal2025</strong></div>`}
}
function hacerLogin(){
  const email=document.getElementById('l-email').value.trim().toLowerCase();
  const pass=document.getElementById('l-pass').value;
  const u=USUARIOS.find(u=>u.email===email&&u.pass===pass);
  if(!u){alert('Correo o contraseña incorrectos');return}
  usuarioActual=u;actualizarUI();cerrarLogin();
  alert(`¡Bienvenido, ${u.nombre}!${u.rol==='admin'?'\n\nAcceso de administrador activado.':''}`);
}
function logout(){usuarioActual=null;actualizarUI();cerrarLogin()}
function actualizarUI(){
  const av=document.getElementById('avatar-disp');
  av.innerHTML=usuarioActual?`<div class="avatar-circle">${usuarioActual.nombre[0]}</div>`:`<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`;
  document.getElementById('fab').className=usuarioActual?.rol==='admin'?'show':'';
  renderFeed();
}

const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
const isStandalone=window.matchMedia('(display-mode: standalone)').matches||navigator.standalone;
if('serviceWorker' in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js').catch(()=>{}));
renderFeed();
</script>
